<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clínica Estética</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="js/login.js"></script>
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-content">
                <h1>Clínica Estética</h1>
                <p>Cuidando da sua aparência com cuidado e profissionalismo.</p>
            </div>
            <footer class="sidebar-footer">
                Todos os direitos reservados.
            </footer>
        </aside>

        <main class="login-section">
            <div class="login-card">
                <h2>LOGIN</h2>
                
                <form>
                    <div class="input-group">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="input-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password">
                    </div>

                    <div class="forgot-password">
                        <a href="pages/esqueceu-senha.html">Esqueceu sua senha?</a>
                    </div>
                    <button type="button" class="btn" onclick="realizarLogin()">Entrar</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
